# Release — tag-triggered. Builds a reproducible binary, checksums it, signs it keyless (sigstore
# cosign — no stored private key), and publishes a GitHub Release. It exists from Phase 0 so that
# packaging/signing breaks surface early; it ships nothing user-facing yet, but every phase preview tag
# (`0.1.0-alpha.N`) exercises the whole path. See ROADMAP.md (Phase 0).
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'           # final releases, e.g. v0.1.0
      - '[0-9]+.[0-9]+.[0-9]+-alpha.*'    # phase previews, e.g. 0.1.0-alpha.3

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # cosign keyless signing (sigstore OIDC)

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: build · sign · publish (x86_64-linux)
    # Guard against a fork's tag push triggering our signing/publish flow. Update at the repo rename.
    if: github.repository == 'kendricklawton/agent'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install the pinned toolchain
        run: rustup show # rust-toolchain.toml's pin

      - uses: Swatinem/rust-cache@v2

      # --locked: build from the committed Cargo.lock, no implicit updates — reproducible releases.
      - name: Build the release binary
        run: cargo build --release --locked -p agent

      - name: Package + checksum
        id: package
        run: |
          set -euo pipefail
          name="agent-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"
          mkdir -p "dist/${name}"
          cp target/release/agent "dist/${name}/agent"
          cp README.md LICENSE "dist/${name}/"
          tar -C dist -czf "${name}.tar.gz" "${name}"
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "tarball=${name}.tar.gz" >> "$GITHUB_OUTPUT"

      # SBOM from the committed Cargo.lock (syft reads it) — makes SECURITY.md's "signed releases + SBOM"
      # promise real. Covers the whole workspace lock; the shipped binary is a subset of that graph.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: ${{ steps.package.outputs.name }}.sbom.cdx.json
          upload-artifact: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless: identity comes from the GitHub OIDC token; each signature + cert is verifiable with
      # `cosign verify-blob` against this workflow's identity. No long-lived secret to manage or leak.
      # Sign the tarball and the SBOM so both are tamper-evident.
      - name: Sign the artifacts (keyless)
        run: |
          set -euo pipefail
          for f in "${{ steps.package.outputs.tarball }}" "${{ steps.package.outputs.name }}.sbom.cdx.json"; do
            cosign sign-blob --yes \
              --output-signature   "${f}.sig" \
              --output-certificate "${f}.pem" \
              "${f}"
          done

      # Fail the release before publishing if a signature doesn't verify — a broken signing config
      # should never ship. Identity is pinned to this workflow file on this repo.
      - name: Verify the signatures
        run: |
          set -euo pipefail
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@${GITHUB_REF}"
          for f in "${{ steps.package.outputs.tarball }}" "${{ steps.package.outputs.name }}.sbom.cdx.json"; do
            cosign verify-blob \
              --certificate          "${f}.pem" \
              --signature            "${f}.sig" \
              --certificate-identity "${identity}" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "${f}"
          done

      - name: Publish the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-alpha.') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.tarball }}.sha256
            ${{ steps.package.outputs.tarball }}.sig
            ${{ steps.package.outputs.tarball }}.pem
            ${{ steps.package.outputs.name }}.sbom.cdx.json
            ${{ steps.package.outputs.name }}.sbom.cdx.json.sig
            ${{ steps.package.outputs.name }}.sbom.cdx.json.pem
