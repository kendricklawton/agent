# eBPF load/verifier smoke-test across PINNED kernels (Tier B).
#
# ┌────────────────────────────────────────────────────────────────────────────────────────────┐
# │ STATUS: SCAFFOLD — NOT YET PROVEN GREEN.                                                     │
# │ This workflow needs iteration on a real runner to settle the lvh kernel tags and the in-VM  │
# │ invocation. It is intentionally NOT a required check and runs only on demand / eBPF changes │
# │ so it can't block M0. The cheap, always-on load check lives in ci.yml (Tier A); this adds   │
# │ the *known-kernel* coverage the uncontrolled GitHub runner kernel can't give (ROADMAP M0).  │
# └────────────────────────────────────────────────────────────────────────────────────────────┘
#
# Approach: build the agent on the host, then boot a microVM on a pinned kernel (cilium's
# little-vm-helper) and run `agent --once` inside it as root, asserting a clean load/attach/exit.
name: eBPF smoke (pinned kernels)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "crates/ebpf/**"
      - "crates/common/**"
      - ".github/workflows/ebpf-smoke.yml"

permissions:
  contents: read

jobs:
  smoke:
    name: load on kernel ${{ matrix.kernel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # lvh kernel image tags — adjust to the published set during iteration
        # (https://github.com/cilium/little-vm-helper-images).
        kernel: ["5.10-main", "6.1-main", "bpf-next-main"]
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchains
        run: |
          rustup show
          rustup toolchain install nightly --profile minimal --component rust-src

      - name: Install bpf-linker
        run: cargo install bpf-linker --locked

      - uses: Swatinem/rust-cache@v2

      - name: Build the agent (userspace + embedded eBPF object)
        run: cargo xtask build

      # Boot a microVM on the pinned kernel and run the smoke test inside it as root.
      # NOTE: the exact lvh action version + `lvh run` flags are what this scaffold needs to settle.
      - name: Load on pinned kernel (microVM)
        uses: cilium/little-vm-helper@v0.0.23
        with:
          test-name: agent-load-${{ matrix.kernel }}
          image-version: ${{ matrix.kernel }}
          install-dependencies: "true"
          cmd: |
            cd /host
            ./target/debug/agent --once
