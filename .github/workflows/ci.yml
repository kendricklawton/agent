# CI — fmt, clippy, build, test, and supply-chain. Needs NO GPU: tests drive the mock collector, so
# the whole pipeline runs headless on a stock runner. See CONTRIBUTING.md.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: build · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install the pinned toolchain
        run: rustup show # auto-installs rust-toolchain.toml's pin + rustfmt/clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build

      - name: Test (headless via the mock collector — no GPU)
        run: cargo test

  deny:
    name: supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
