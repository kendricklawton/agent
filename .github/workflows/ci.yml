# CI — fmt, clippy, build, test, and supply-chain. Needs NO GPU: tests drive the mock collector, so
# the whole pipeline runs headless on a stock runner. See CONTRIBUTING.md.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: build · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install the pinned toolchain
        run: rustup show # auto-installs rust-toolchain.toml's pin + rustfmt/clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      # --locked everywhere: build from the committed Cargo.lock, so a stale lock fails CI instead of
      # surfacing at release time (the release workflow also builds --locked).
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --locked

      - name: Test (headless via the mock collector — no GPU)
        run: cargo test --locked

  features:
    name: feature matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      # Every feature combination (and --no-default-features) must compile. Trivial today — no features
      # are defined yet — but it guards the DCGM/Splunk/etc. features the moment they land.
      - name: Check the feature powerset
        run: cargo hack --feature-powerset --no-dev-deps check --workspace --locked

  deny:
    name: supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
