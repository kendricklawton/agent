# Directory-scoped toolchain: the eBPF crate builds on NIGHTLY (aya's BPF target needs
# `-Z build-std=core` + `rust-src`). This overrides the workspace-root stable pin for any
# cargo invocation whose working directory is this crate — which is how `agent/build.rs`
# selects nightly for just the eBPF object while the rest of the workspace stays on stable.
#
# TODO(repro): pin an exact `nightly-YYYY-MM-DD` once CI is set up, for reproducible builds.
[toolchain]
channel    = "nightly"
components = ["rust-src"]
profile    = "minimal"
