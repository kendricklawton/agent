# cargo-deny — supply-chain gate. https://embarkstudios.github.io/cargo-deny/

[advisories]
# Fail on any unignored security advisory. Add to `ignore` only with a linked tracking issue.
ignore = []

[bans]
# Multiple versions of one crate usually mean a missed dedup; surface them.
multiple-versions = "warn"
# Wildcard deps (foo = "*") break reproducibility. The internal `agent-*` path deps carry explicit
# versions in the workspace table, so they aren't wildcards.
wildcards = "deny"

[licenses]
confidence-threshold = 0.8
# Approved SPDX identifiers. The GUI/wgpu tree (wired in M1+) pulls a wider set than today's
# clap/anyhow deps; extend this list (with a reason) as real deps require it.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
