# cargo-deny — supply-chain gate. https://embarkstudios.github.io/cargo-deny/

[advisories]
# Fail on any unignored security advisory. No ignores right now. If an unfixable transitive advisory
# appears, add it here (with a reason) and mirror it in .cargo/audit.toml so the scheduled scan agrees.

[bans]
# Multiple versions of one crate usually mean a missed dedup; surface them.
multiple-versions = "warn"
# Wildcard deps (foo = "*") break reproducibility. The internal `agent-*` path deps carry explicit
# versions in the workspace table, so they aren't wildcards.
wildcards = "deny"

[licenses]
confidence-threshold = 0.8
# Approved SPDX identifiers. Extend this list (with a reason) as real deps require it — e.g. the HTTP
# stack (reqwest/tokio) lands with the real adapters.
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
]

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
