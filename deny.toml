# cargo-deny — supply-chain gate. https://embarkstudios.github.io/cargo-deny/

[advisories]
# Fail on any unignored security advisory. The two below are *unmaintained* notices (not
# vulnerabilities) on transitive deps of the eframe/egui GUI stack, with no safe upgrade available.
# Revisit when egui's font/winit tree moves off them.
ignore = [
    "RUSTSEC-2024-0436", # paste (unmaintained) — accesskit → egui-winit → eframe
    "RUSTSEC-2026-0192", # ttf-parser (unmaintained) — ab_glyph → epaint → egui
]

[bans]
# Multiple versions of one crate usually mean a missed dedup; surface them.
multiple-versions = "warn"
# Wildcard deps (foo = "*") break reproducibility. The internal `agent-*` path deps carry explicit
# versions in the workspace table, so they aren't wildcards.
wildcards = "deny"

[licenses]
confidence-threshold = 0.8
# Approved SPDX identifiers. The GUI/wgpu tree (wired in Phase 1+) pulls a wider set than today's
# clap/anyhow deps; extend this list (with a reason) as real deps require it.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "BSL-1.0",            # Boost license — permissive code deps in the wgpu tree
    # egui bundles its default fonts: Open Font License (Noto/emoji) + the Ubuntu Font License (a
    # non-SPDX LicenseRef). Both are font-asset licenses, permissive for distribution.
    "OFL-1.1",
    "LicenseRef-UFL-1.0",
]

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
